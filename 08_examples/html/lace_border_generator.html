<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lace Border Generator</title>
  <style>
    body { margin:0; background:#111; color:white; font-family:system-ui,sans-serif; }
    canvas { display:block; margin:auto; background:#181818; }
    .note { position:fixed; left:12px; top:10px; opacity:.8; font-size:13px; }
  </style>
</head>
<body>
<div class="note">Lace Border Generator — press S to save</div>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script>

function setup(){ createCanvas(1200,400); noLoop(); }
function draw(){
  background(250);
  stroke(20); noFill(); strokeWeight(3);
  let count=18, step=width/count;
  line(0,210,width,210);
  for(let i=0;i<count;i++){
    let x=i*step+step/2;
    arc(x,210,step*0.9,130,PI,0);
    ellipse(x,135,18,18);
    for(let j=-2;j<=2;j++){ ellipse(x+j*step/6, 205+abs(j)*8, 8,8); }
    line(x-step/2,210,x,270);
    line(x+step/2,210,x,270);
    ellipse(x,280,38,38);
  }
}
function keyPressed(){ if(key==='s'||key==='S') saveCanvas('lace_border','png'); }

</script>
</body>
</html>
