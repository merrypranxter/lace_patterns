<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Filet Lace Chart</title>
  <style>
    body { margin:0; background:#111; color:white; font-family:system-ui,sans-serif; }
    canvas { display:block; margin:auto; background:#181818; }
    .note { position:fixed; left:12px; top:10px; opacity:.8; font-size:13px; }
  </style>
</head>
<body>
<div class="note">Filet Lace Chart — press S to save</div>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<script>

const grid=36;
function setup(){ createCanvas(900,900); noLoop(); }
function draw(){
  background(250);
  let s=width/grid;
  stroke(20); strokeWeight(1);
  for(let y=0;y<grid;y++){
    for(let x=0;x<grid;x++){
      let cx=x-grid/2, cy=y-grid/2;
      let d=sqrt(cx*cx+cy*cy);
      let filled = (d<10 && (abs(cx)<2 || abs(cy)<2 || abs(cx-cy)<2 || abs(cx+cy)<2)) || (d>13 && d<15);
      if(filled){ fill(20); rect(x*s,y*s,s,s); }
      else { noFill(); rect(x*s,y*s,s,s); }
    }
  }
}
function keyPressed(){ if(key==='s'||key==='S') saveCanvas('filet_lace_chart','png'); }

</script>
</body>
</html>
